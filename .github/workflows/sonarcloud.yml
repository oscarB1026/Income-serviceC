name: SonarCloud Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  sonar:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and test with JaCoCo
        run: ./mvnw -B clean verify jacoco:report -Dspring.profiles.active=test

      - name: Verificar reporte JaCoCo
        run: |
          echo "=== Buscando jacoco.xml ==="
          find . -name "jacoco.xml" 2>/dev/null || echo "❌ jacoco.xml NO encontrado"
          echo ""
          echo "=== Buscando jacoco.exec ==="
          find . -name "jacoco.exec" 2>/dev/null || echo "❌ jacoco.exec NO encontrado"
          echo ""
          echo "=== Tests ejecutados ==="
          find . -name "*.xml" -path "*/surefire-reports/*" | head -10

      - name: Analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw -B sonar:sonar -Dsonar.projectKey=fabrica-escuela_income-service

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/